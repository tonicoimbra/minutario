<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minutário</title>
  <link rel="stylesheet" href="lib/quill.snow.css">
  <link rel="stylesheet" href="assets/dashboard.css">
  <link rel="stylesheet" href="shared/auth-ui.css">
  <style>
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .login-screen .login-box {
      background: #16213e;
      border-radius: 12px;
      padding: 40px 32px;
      width: min(460px, calc(100vw - 40px));
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .login-screen .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-screen .login-brand .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #e94560;
      border-radius: 14px;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .login-screen .login-brand h1 { margin: 0; font-size: 24px; }
    .login-screen .login-brand p { margin: 4px 0 0; color: #8892b0; font-size: 13px; }
    .login-screen .auth-label,
    .login-screen .field-error,
    .login-screen .password-strength,
    .login-screen .form-status,
    .login-screen .auth-note {
      color: #a8b2d1;
    }
    .login-screen .auth-input {
      background: #0f3460;
      color: #fff;
      border: 1px solid #233554;
    }
    .login-screen .domain-suffix {
      background: #102847;
      color: #cbd5e1;
      border-color: #233554;
    }
    .login-screen .auth-button {
      background: #e94560;
      color: #fff;
    }
    .login-screen .auth-secondary-btn {
      background: #102847;
      border-color: #233554;
      color: #e2e8f0;
    }
    .login-screen .auth-link-btn,
    .login-screen .auth-doc-link {
      color: #93c5fd;
    }
    .login-screen .auth-success-box {
      border: 1px solid rgba(134, 239, 172, 0.42);
      background: rgba(20, 83, 45, 0.42);
      color: #bbf7d0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.4;
    }
    .login-screen .auth-note {
      color: #93a4c7;
      font-size: 12px;
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div class="login-brand">
        <div class="mark">M</div>
        <h1>Minutário</h1>
        <p>Expansão de atalhos de texto</p>
      </div>
      <div class="auth-views">
        <div id="login-view" class="auth-view">
          <form id="login-form" class="auth-form">
            <label class="auth-label" for="login-email-id">E-mail institucional</label>
            <div class="auth-input-wrap">
              <input id="login-email-id" class="auth-input" type="text" placeholder="seunome" autocomplete="username" required>
              <span class="domain-suffix">@tjpr.jus.br</span>
            </div>
            <span id="login-email-error" class="field-error"></span>

            <label class="auth-label" for="login-password">Senha</label>
            <div class="password-wrap">
              <input id="login-password" class="auth-input" type="password" autocomplete="current-password" required>
              <button id="toggle-login-password" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
            </div>
            <div class="auth-inline-links">
              <button id="go-forgot" class="auth-link-btn" type="button">Esqueci minha senha</button>
              <button id="go-signup" class="auth-link-btn" type="button">Criar conta</button>
            </div>
            <button id="login-btn" class="auth-button" type="submit">
              <span class="auth-submit-content"><span class="btn-text">Entrar</span></span>
            </button>
            <div id="login-status" class="form-status"></div>
          </form>
          <div id="resend-confirmation-wrap" class="resend-wrap hidden">
            <button id="resend-confirmation-btn" class="auth-secondary-btn" type="button">Reenviar e-mail de confirmação</button>
            <span id="resend-countdown" class="form-status"></span>
          </div>
        </div>

        <div id="signup-view" class="auth-view hidden">
          <form id="signup-form" class="auth-form">
            <label class="auth-label" for="signup-email-id">E-mail institucional</label>
            <div class="auth-input-wrap">
              <input id="signup-email-id" class="auth-input" type="text" placeholder="seunome" autocomplete="email" required>
              <span class="domain-suffix">@tjpr.jus.br</span>
            </div>
            <span id="signup-email-error" class="field-error"></span>

            <label class="auth-label" for="signup-password">Senha</label>
            <div class="password-wrap">
              <input id="signup-password" class="auth-input" type="password" autocomplete="new-password" required>
              <button id="toggle-signup-password" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
            </div>
            <span id="signup-password-strength" class="password-strength"></span>
            <span id="signup-password-error" class="field-error"></span>

            <label class="auth-label" for="signup-password-confirm">Confirmar senha</label>
            <div class="password-wrap">
              <input id="signup-password-confirm" class="auth-input" type="password" autocomplete="new-password" required>
              <button id="toggle-signup-password-confirm" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
            </div>
            <span id="signup-confirm-error" class="field-error"></span>

            <label class="lgpd-check">
              <input id="signup-lgpd-accept" type="checkbox">
              <span>
                Li e aceito os
                <a id="terms-link" class="auth-doc-link" href="shared/terms.html" target="_blank" rel="noopener noreferrer">Termos de Uso</a>
                e a
                <a id="privacy-link" class="auth-doc-link" href="shared/privacy.html" target="_blank" rel="noopener noreferrer">Política de Privacidade</a>.
              </span>
            </label>

            <button id="signup-btn" class="auth-button" type="submit" disabled>
              <span class="auth-submit-content"><span class="btn-text">Criar Conta</span></span>
            </button>
            <button id="back-to-login-from-signup" class="auth-secondary-btn" type="button">Voltar ao Login</button>
            <div id="signup-status" class="form-status"></div>
          </form>
        </div>

        <div id="forgot-view" class="auth-view hidden">
          <form id="forgot-form" class="auth-form">
            <label class="auth-label" for="forgot-email-id">E-mail institucional</label>
            <div class="auth-input-wrap">
              <input id="forgot-email-id" class="auth-input" type="text" placeholder="seunome" autocomplete="email" required>
              <span class="domain-suffix">@tjpr.jus.br</span>
            </div>
            <span id="forgot-email-error" class="field-error"></span>

            <button id="forgot-btn" class="auth-button" type="submit">
              <span class="auth-submit-content"><span class="btn-text">Enviar link de redefinição</span></span>
            </button>
            <button id="back-to-login-from-forgot" class="auth-secondary-btn" type="button">Voltar ao Login</button>
            <div id="forgot-status" class="form-status"></div>
          </form>
        </div>

        <div id="reset-view" class="auth-view hidden">
          <form id="reset-form" class="auth-form">
            <label class="auth-label" for="reset-new-password">Nova senha</label>
            <div class="password-wrap">
              <input id="reset-new-password" class="auth-input" type="password" autocomplete="new-password" required>
              <button id="toggle-reset-new-password" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
            </div>
            <span id="reset-password-strength" class="password-strength"></span>
            <span id="reset-password-error" class="field-error"></span>

            <label class="auth-label" for="reset-confirm-password">Confirmar nova senha</label>
            <div class="password-wrap">
              <input id="reset-confirm-password" class="auth-input" type="password" autocomplete="new-password" required>
              <button id="toggle-reset-confirm-password" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
            </div>
            <span id="reset-confirm-error" class="field-error"></span>

            <button id="reset-btn" class="auth-button" type="submit">
              <span class="auth-submit-content"><span class="btn-text">Salvar nova senha</span></span>
            </button>
            <button id="back-to-login-from-reset" class="auth-secondary-btn" type="button">Voltar ao Login</button>
            <div id="reset-status" class="form-status"></div>
          </form>
        </div>

        <div id="signup-success-box" class="auth-success-box hidden"></div>
      </div>
      <p class="auth-note">Coletamos somente e-mail institucional e credenciais de autenticação para acesso ao sistema.</p>
    </div>
  </div>

  <div id="dashboard-screen" class="hidden">
    <header class="top-bar">
      <div class="brand-wrap">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div>
          <h1 class="brand-title">Minutário</h1>
          <p class="brand-subtitle">Expansão de atalhos de texto no desktop</p>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-secondary" type="button" style="margin-left:auto">Sair</button>
    </header>

    <section class="import-bar">
      <div class="import-group">
        <label class="btn btn-secondary import-label">
          <input type="file" id="import-csv" accept=".csv" hidden>
          📁 Importar CSV
        </label>
        <span id="import-status" class="import-status"></span>
      </div>
      <button id="export-csv" class="btn btn-secondary" type="button">💾 Exportar CSV</button>
      <button id="supabase-sync" class="btn btn-secondary" type="button">Sincronizar</button>
      <span id="sync-badge" class="sync-badge sync-idle">Sincronizado</span>
    </section>

    <main class="dashboard-grid">
      <aside class="panel panel-folders">
        <div class="panel-head">PASTAS</div>
        <ul id="folder-list" class="folder-list"></ul>
        <div class="folder-actions">
          <button id="new-folder" class="btn btn-secondary" type="button">+ Nova Pasta</button>
          <button id="rename-folder" class="btn btn-secondary" type="button" disabled>Renomear Pasta</button>
          <button id="delete-folder" class="btn btn-danger btn-folder-delete" type="button" disabled>Excluir Pasta</button>
        </div>
      </aside>

      <section class="panel panel-list">
        <button id="new-template" class="btn btn-primary btn-new-template-list" type="button">+ Novo Template</button>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Buscar por nome ou atalho..." autocomplete="off">
        </div>
        <ul id="template-list" class="template-list"></ul>
      </section>

      <section class="panel panel-editor">
        <form id="editor-form" class="editor-form">
          <label for="tpl-name">Nome</label>
          <input id="tpl-name" type="text" maxlength="120" required>

          <label for="tpl-shortcut">Atalho</label>
          <div class="shortcut-wrap">
            <span class="shortcut-prefix">/</span>
            <input id="tpl-shortcut" type="text" maxlength="30" placeholder="ex: contrato" autocomplete="off" required>
          </div>
          <span id="shortcut-error" class="shortcut-error" aria-live="polite"></span>

          <label for="tpl-folder">Pasta</label>
          <select id="tpl-folder"></select>

          <label for="quill-editor">Conteúdo</label>
          <div id="quill-editor"></div>

          <div class="editor-actions">
            <button id="save-template" class="btn btn-primary" type="submit">Salvar</button>
            <button id="delete-template" class="btn btn-danger" type="button">Excluir</button>
          </div>
        </form>
        <div id="toast" aria-live="polite" aria-atomic="true"></div>
      </section>
    </main>
  </div>

  <script src="lib/papaparse.min.js"></script>
  <script src="lib/supabase.min.js"></script>
  <script src="lib/quill.min.js"></script>
  <script src="shared/browser-compat.js"></script>
  <script src="shared/config.js"></script>
  <script src="shared/word-clipboard.js"></script>
  <script src="shared/db.js"></script>
  <script src="shared/api.js"></script>
  <script src="shared/sync.js"></script>
  <script src="shared/auth-ui.js"></script>
  <script src="sync/csv.js"></script>
  <script src="sync/supabase.js"></script>
  <script src="sync/index.js"></script>
  <script src="assets/dashboard.js" defer></script>
</body>
</html>
