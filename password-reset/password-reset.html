<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir senha - Minutário</title>
    <link rel="stylesheet" href="../shared/auth-ui.css" />
    <style>
      :root {
        --slate-50: #f8fafc;
        --slate-200: #e2e8f0;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --tjpr-navy-800: #1b263b;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--slate-50);
        color: var(--slate-700);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(460px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid var(--slate-200);
        border-radius: 10px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 6px;
        color: var(--slate-800);
      }

      .subtitle {
        margin: 0 0 16px;
        font-size: 13px;
      }

      .auth-button {
        background: var(--tjpr-navy-800);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redefinir senha</h1>
      <p class="subtitle">Defina sua nova senha para acessar o Minutário.</p>
      <form id="reset-form" class="auth-form">
        <label class="auth-label" for="new-password">Nova senha</label>
        <div class="password-wrap">
          <input id="new-password" class="auth-input" type="password" autocomplete="new-password" required />
          <button id="toggle-new-password" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
        </div>
        <span id="password-strength" class="password-strength"></span>
        <span id="password-error" class="field-error"></span>

        <label class="auth-label" for="confirm-password">Confirmar nova senha</label>
        <div class="password-wrap">
          <input id="confirm-password" class="auth-input" type="password" autocomplete="new-password" required />
          <button id="toggle-confirm-password" class="toggle-password-btn" type="button" aria-label="Mostrar senha"></button>
        </div>
        <span id="confirm-error" class="field-error"></span>

        <button id="reset-submit-btn" class="auth-button" type="submit">
          <span class="auth-submit-content"><span class="btn-text">Salvar nova senha</span></span>
        </button>
      </form>
      <p id="status" class="form-status" aria-live="polite"></p>
    </main>

    <script src="../lib/supabase.min.js"></script>
    <script src="../shared/browser-compat.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/api.js"></script>
    <script src="../shared/auth-ui.js"></script>
    <script src="./password-reset.js"></script>
  </body>
</html>
