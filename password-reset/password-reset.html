<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir senha - Minutário</title>
    <style>
      :root {
        --navy: #1b263b;
        --slate: #334155;
        --border: #dbe3ee;
        --surface: #ffffff;
        --bg: #f4f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--slate);
        font-family: "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      h1 {
        margin: 0 0 16px;
        color: var(--navy);
        font-size: 22px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      input {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--navy);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 11px 12px;
      }

      .status {
        min-height: 20px;
        margin: 12px 0 0;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redefinir senha</h1>
      <form id="reset-form">
        <input id="new-password" type="password" placeholder="Nova senha (mín. 8 caracteres)" autocomplete="new-password" required />
        <input id="confirm-password" type="password" placeholder="Confirmar nova senha" autocomplete="new-password" required />
        <button type="submit">Salvar nova senha</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="../lib/supabase.min.js"></script>
    <script src="../shared/browser-compat.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/api.js"></script>
    <script src="./password-reset.js"></script>
  </body>
</html>
