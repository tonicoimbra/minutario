<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conta confirmada - Minutário</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #1e293b;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 28px 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        color: #065f46;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Conta confirmada com sucesso</h1>
      <p>
        Seu e-mail foi validado. Volte para o Minutário e faça login normalmente para acessar suas
        minutas.
      </p>
    </main>
  </body>
</html>
