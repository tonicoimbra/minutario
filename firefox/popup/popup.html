<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minutário</title>
    <link rel="stylesheet" href="./popup.css" />
    <style>
      .hidden { display: none !important; }
      .login-form { display: flex; flex-direction: column; gap: 10px; }
      .login-form input {
        padding: 10px 12px;
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
      }
      #login-btn {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: var(--tjpr-navy-800);
        color: #ffffff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        padding: 11px 12px;
        cursor: pointer;
        transition: transform 150ms ease, background-color 150ms ease, box-shadow 150ms ease;
        box-shadow: 0 8px 18px rgba(27, 38, 59, 0.18);
      }
      #login-btn:hover {
        background: var(--tjpr-navy-700);
        box-shadow: 0 10px 22px rgba(27, 38, 59, 0.24);
        transform: translateY(-1px);
      }
      .login-error {
        color: #dc2626;
        font-size: 12px;
        margin: 8px 0 0;
        min-height: 18px;
      }
      .login-help {
        display: flex;
        justify-content: center;
        margin-top: 10px;
        font-size: 12px;
      }
      .login-help button {
        border: 0;
        background: transparent;
        color: var(--tjpr-navy-700);
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        padding: 0;
      }
      .login-help button:hover {
        color: var(--tjpr-navy-800);
        text-decoration: underline;
      }
      .user-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--slate-200);
      }
      .user-email {
        font-size: 13px;
        font-weight: 700;
        color: var(--slate-800);
        max-width: 60%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sync-status {
        font-size: 11px;
        color: var(--slate-500);
      }
      .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }
      .action-buttons button {
        width: 100%;
        border-radius: 10px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        padding: 11px 12px;
        cursor: pointer;
        transition: transform 150ms ease, background-color 150ms ease, box-shadow 150ms ease;
      }
      #open-quick-access {
        border: 0;
        background: var(--tjpr-navy-800);
        color: #ffffff;
        box-shadow: 0 8px 18px rgba(27, 38, 59, 0.18);
      }
      #open-quick-access:hover {
        background: var(--tjpr-navy-700);
        box-shadow: 0 10px 22px rgba(27, 38, 59, 0.24);
        transform: translateY(-1px);
      }
      #open-dashboard {
        border: 1px solid var(--slate-200);
        background: #ffffff;
        color: var(--slate-700);
        box-shadow: none;
      }
      #open-dashboard:hover {
        background: var(--slate-100);
        border-color: rgba(65, 90, 119, 0.42);
        transform: translateY(-1px);
      }
      #force-sync {
        border: 0;
        background: var(--tjpr-navy-700);
        color: #ffffff;
        box-shadow: 0 8px 18px rgba(27, 38, 59, 0.18);
      }
      #force-sync:hover {
        background: var(--tjpr-navy-600);
        box-shadow: 0 10px 22px rgba(27, 38, 59, 0.24);
        transform: translateY(-1px);
      }
      #logout {
        border: 1px solid var(--slate-200);
        background: var(--slate-100);
        color: var(--slate-700);
        box-shadow: none;
      }
      #logout:hover {
        background: #ffffff;
        border-color: rgba(65, 90, 119, 0.42);
        transform: translateY(-1px);
      }
      #toggle-password-form {
        border: 1px solid var(--slate-200);
        background: #ffffff;
        color: var(--slate-700);
        box-shadow: none;
      }
      #toggle-password-form:hover {
        background: var(--slate-100);
        border-color: rgba(65, 90, 119, 0.42);
        transform: translateY(-1px);
      }
      .password-form {
        margin: -4px 0 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .password-form input {
        padding: 10px 12px;
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
      }
      .password-actions {
        display: flex;
        gap: 8px;
      }
      .password-actions button {
        flex: 1;
      }
      #save-password-btn {
        border: 0;
        background: var(--tjpr-navy-800);
        color: #ffffff;
      }
      #cancel-password-btn {
        border: 1px solid var(--slate-200);
        background: var(--slate-100);
        color: var(--slate-700);
      }
      .account-status {
        margin: 0 2px 8px;
        min-height: 16px;
        color: var(--slate-500);
        font-size: 11px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <header class="popup-hero">
      <div class="brand-mark" aria-hidden="true">M</div>
      <div>
        <p class="eyebrow">Biblioteca de minutas</p>
        <h1>Minutário</h1>
        <p class="subtitle">Minutas rápidas para Word Online</p>
      </div>
    </header>

    <section id="login-section" class="popup-card hidden">
      <form id="login-form" class="login-form">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="login-password" placeholder="Senha" required autocomplete="current-password" />
        <button type="submit" id="login-btn">Entrar</button>
      </form>
      <p style="margin: 10px 0 0; color: var(--slate-500); font-size: 11px; line-height: 1.35;">
        Conta criada pelo administrador. Use seu email e senha.
      </p>
      <div class="login-help">
        <button id="forgot-password" type="button">Esqueci minha senha</button>
      </div>
      <p id="login-error" class="login-error" aria-live="polite"></p>
    </section>

    <section id="dashboard-section" class="popup-card hidden">
      <div class="user-info">
        <span id="user-email" class="user-email"></span>
        <span id="sync-status" class="sync-status">Pronto</span>
      </div>
      <div class="action-buttons">
        <button id="open-quick-access" type="button">Consulta Rápida</button>
        <button id="open-dashboard" type="button">Abrir Dashboard</button>
        <button id="force-sync" type="button">Sincronizar</button>
        <button id="toggle-password-form" type="button">Trocar Senha</button>
        <button id="logout" type="button">Sair</button>
      </div>
      <form id="password-form" class="password-form hidden">
        <input type="password" id="new-password" placeholder="Nova senha (mín. 8 caracteres)" autocomplete="new-password" />
        <input type="password" id="confirm-password" placeholder="Confirmar nova senha" autocomplete="new-password" />
        <div class="password-actions">
          <button id="save-password-btn" type="submit">Salvar senha</button>
          <button id="cancel-password-btn" type="button">Cancelar</button>
        </div>
      </form>
      <p id="account-status" class="account-status" aria-live="polite"></p>
    </section>

    <footer>
      <span id="app-version">v-</span>
      <span>Desenvolvido por Elvertoni Coimbra</span>
    </footer>

    <script src="../lib/supabase.min.js"></script>
    <script src="../shared/browser-compat.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/word-clipboard.js"></script>
    <script src="../shared/db.js"></script>
    <script src="../shared/api.js"></script>
    <script src="../shared/sync.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
